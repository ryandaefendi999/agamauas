<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ujian Sekolah PAI & BP — Kelas 9</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #1a6b45;
    --green-light: #e8f5ee;
    --green-mid: #2d9b62;
    --gold: #c9922a;
    --gold-light: #fdf3e3;
    --bg: #f7f5f0;
    --white: #ffffff;
    --text: #1a1a1a;
    --muted: #6b6b6b;
    --border: #d8d4cc;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--green);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    height: 56px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .nav-brand {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.3px;
  }
  .nav-brand span { color: #a8e6c4; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 6px 18px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-tab.active { background: #ffffff; color: var(--green); border-color: #fff; }

  /* ===== PAGES ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== PAGE 1: MATERI ===== */
  .materi-hero {
    background: linear-gradient(135deg, var(--green) 0%, #0f4a2e 100%);
    color: white;
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .materi-hero::before {
    content: '☪';
    position: absolute;
    font-size: 200px;
    opacity: 0.05;
    right: -30px;
    top: -40px;
    line-height: 1;
  }
  .materi-hero h1 {
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .materi-hero p { font-size: 14px; opacity: 0.8; }

  .materi-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .topic-group {
    margin-bottom: 2rem;
  }
  .topic-group-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--green);
    border-left: 3px solid var(--green);
    padding-left: 10px;
    margin-bottom: 12px;
  }
  .topic-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 10px;
  }
  .topic-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    border-left: 3px solid transparent;
  }
  .topic-card:hover {
    border-left-color: var(--green-mid);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .topic-card.open { border-left-color: var(--green); background: var(--green-light); }
  .topic-card-header {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .topic-num {
    font-size: 11px;
    font-weight: 700;
    background: var(--green);
    color: white;
    border-radius: 6px;
    padding: 2px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .topic-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.4;
  }
  .topic-body {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .topic-card.open .topic-body { display: block; }
  .topic-body strong { color: var(--text); }
  .topic-body .ayat {
    font-family: 'Amiri', serif;
    font-size: 16px;
    direction: rtl;
    text-align: right;
    color: var(--green);
    background: var(--green-light);
    border-radius: 8px;
    padding: 10px 14px;
    margin: 8px 0;
    line-height: 2;
  }

  /* ===== PAGE 2: SOAL ===== */
  .soal-wrap {
    max-width: 700px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    min-height: calc(100vh - 56px);
    display: flex;
    flex-direction: column;
  }

  .soal-progress-bar {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .soal-progress-fill {
    height: 100%;
    background: var(--green-mid);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .soal-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .soal-counter {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.5px;
  }
  .soal-cat-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--gold-light);
    color: var(--gold);
    border: 1px solid #e8c97a;
  }

  .soal-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    flex: 1;
    box-shadow: var(--shadow);
  }

  .soal-q {
    font-size: clamp(15px, 2.5vw, 17px);
    font-weight: 600;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 1.5rem;
  }

  .soal-options { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .soal-opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.18s;
    font-size: 14px;
    line-height: 1.5;
    background: var(--bg);
  }
  .soal-opt:hover { border-color: var(--green-mid); background: var(--green-light); }
  .soal-opt.selected { border-color: var(--green); background: var(--green-light); }
  .soal-opt.correct { border-color: #2d9b62; background: #e2f5ec; }
  .soal-opt.wrong { border-color: #e24b4a; background: #fdf0f0; }
  .opt-letter {
    font-weight: 700;
    font-size: 13px;
    color: var(--green);
    min-width: 18px;
    flex-shrink: 0;
  }
  .soal-opt.correct .opt-letter { color: #1a6b45; }
  .soal-opt.wrong .opt-letter { color: #c0392b; }

  .soal-feedback {
    margin-top: 1rem;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .soal-feedback.show { display: block; }
  .soal-feedback.correct-fb { background: #e2f5ec; color: #1a6b45; border-left: 3px solid #2d9b62; }
  .soal-feedback.wrong-fb { background: #fdf0f0; color: #a32d2d; border-left: 3px solid #e24b4a; }

  .soal-nav {
    display: flex;
    gap: 10px;
    margin-top: 1.5rem;
    justify-content: space-between;
    align-items: center;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .btn-outline { background: var(--white); color: var(--text); }
  .btn-outline:hover { background: var(--bg); border-color: #aaa; }
  .btn-primary { background: var(--green); color: white; border-color: var(--green); }
  .btn-primary:hover { background: #0f4a2e; }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .soal-skip-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .skip-num {
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--white);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .skip-num:hover { border-color: var(--green); color: var(--green); }
  .skip-num.done { background: var(--green); border-color: var(--green); color: white; }
  .skip-num.current { border-color: var(--gold); color: var(--gold); background: var(--gold-light); }

  .hasil-wrap {
    text-align: center;
    padding: 3rem 1.5rem;
  }
  .hasil-score {
    font-size: 72px;
    font-weight: 700;
    color: var(--green);
    line-height: 1;
    margin-bottom: 8px;
  }
  .hasil-label { font-size: 16px; color: var(--muted); margin-bottom: 2rem; }
  .hasil-detail {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    max-width: 400px;
    margin: 0 auto 2rem;
  }
  .hasil-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    font-size: 13px;
    font-weight: 600;
  }
  .hasil-box span { display: block; font-size: 22px; margin-bottom: 2px; }
  .hasil-box.benar span { color: var(--green); }
  .hasil-box.salah span { color: #e24b4a; }
  .hasil-box.sisa span { color: var(--gold); }

  @media (max-width: 600px) {
    nav { padding: 0 1rem; }
    .nav-brand { font-size: 12px; }
    .materi-hero { padding: 2rem 1rem 1.5rem; }
    .soal-card { padding: 1.25rem; }
    .hasil-detail { grid-template-columns: 1fr 1fr 1fr; }
  }

  /* ===== AUDIO PLAYER ===== */
  #music-btn {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 999;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(26,107,69,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    flex-direction: column;
    gap: 2px;
  }
  #music-btn:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(26,107,69,0.55); }
  #music-btn svg { width: 22px; height: 22px; fill: white; }
  #music-btn .music-label {
    font-size: 9px;
    color: rgba(255,255,255,0.85);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .music-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 18px;
  }
  .music-bars span {
    display: block;
    width: 3px;
    background: white;
    border-radius: 2px;
    animation: bar-bounce 0.8s ease-in-out infinite alternate;
  }
  .music-bars span:nth-child(1) { height: 8px; animation-delay: 0s; }
  .music-bars span:nth-child(2) { height: 14px; animation-delay: 0.15s; }
  .music-bars span:nth-child(3) { height: 10px; animation-delay: 0.3s; }
  .music-bars span:nth-child(4) { height: 16px; animation-delay: 0.1s; }
  .music-bars span:nth-child(5) { height: 6px; animation-delay: 0.25s; }
  @keyframes bar-bounce {
    from { transform: scaleY(0.4); opacity: 0.7; }
    to { transform: scaleY(1); opacity: 1; }
  }
  .music-bars.paused span { animation-play-state: paused; opacity: 0.5; }

  #music-toast {
    position: fixed;
    bottom: 86px;
    right: 24px;
    z-index: 998;
    background: #1a1a1a;
    color: white;
    font-size: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    padding: 8px 14px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #music-toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">PAI & BP <span>Kelas 9</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('materi')">📖 Materi</button>
    <button class="nav-tab" onclick="showPage('soal')">✏️ Latihan Soal</button>
  </div>
</nav>

<!-- ===== PAGE 1: MATERI ===== -->
<div id="page-materi" class="page active">
  <div class="materi-hero">
    <h1>Materi Kisi-kisi Ujian Sekolah</h1>
    <p>Pendidikan Agama Islam & Budi Pekerti — SMP Kelas 9 · Kurikulum Merdeka</p>
    <p style="margin-top:6px; font-size:13px; opacity:0.65;">Klik setiap topik untuk membaca penjelasan lengkap</p>
  </div>

  <div class="materi-container" id="materi-content"></div>
</div>

<!-- ===== PAGE 2: SOAL ===== -->
<div id="page-soal" class="page">
  <div class="soal-wrap">
    <div class="soal-progress-bar">
      <div class="soal-progress-fill" id="progress-fill" style="width:2%"></div>
    </div>
    <div class="soal-meta">
      <span class="soal-counter" id="soal-counter">Soal 1 / 50</span>
      <span class="soal-cat-badge" id="soal-cat">Aqidah</span>
    </div>
    <div id="soal-area"></div>

    <div class="soal-skip-grid" id="skip-grid"></div>
  </div>
</div>

<script>
// ===========================
// DATA MATERI + SOAL
// ===========================
const topics = [
  {
    n: 1, cat: "Ibadah & Fiqih", name: "Hikmah Berkurban",
    materi: `<strong>Qurban (Udhiyah)</strong> adalah menyembelih hewan ternak pada Hari Raya Idul Adha (10 Dzulhijjah) dan Hari Tasyrik (11-13 Dzulhijjah) untuk mendekatkan diri kepada Allah. <br><br><strong>Hikmah Berkurban:</strong><br>1. Mendekatkan diri (taqarrub) kepada Allah SWT<br>2. Mensyukuri nikmat Allah atas harta yang dimiliki<br>3. Mengenang dan meneladani keikhlasan Nabi Ibrahim & Ismail AS<br>4. Kepedulian sosial — berbagi daging kepada fakir miskin<br>5. Mempererat silaturahmi dan ukhuwah Islamiyah<br>6. Melatih jiwa kedermawanan dan mengurangi sifat kikir`,
    soal: "Salah satu hikmah utama berkurban adalah...",
    opsi: ["Mendapat pujian dari masyarakat", "Mendekatkan diri (taqarrub) kepada Allah SWT", "Memperlihatkan kekayaan kepada orang lain", "Menggugurkan kewajiban zakat"],
    jawaban: 1,
    feedback: "Hikmah utama berkurban adalah taqarrub (mendekatkan diri) kepada Allah, sebagaimana firman Allah dalam QS. Al-Hajj: 37 bahwa yang sampai kepada Allah bukan daging/darahnya melainkan ketakwaannya."
  },
  {
    n: 2, cat: "Aqidah", name: "Hikmah Beriman kepada Qada dan Qadar",
    materi: `<strong>Qada</strong> = ketetapan Allah sejak azali. <strong>Qadar</strong> = pelaksanaan ketetapan tersebut pada waktunya.<br><br><strong>Hikmah beriman kepada Qada & Qadar:</strong><br>1. Melatih kesabaran saat menerima musibah<br>2. Tidak sombong ketika sukses karena semua dari Allah<br>3. Tidak berputus asa karena Allah yang menentukan segalanya<br>4. Meningkatkan tawakkal dan motivasi berusaha<br>5. Jiwa lebih tenang, tidak stres berlebihan`,
    soal: "Hikmah beriman kepada qada dan qadar yang paling tepat adalah...",
    opsi: ["Menjadi pasif dan tidak mau berusaha", "Meningkatkan rasa sabar, tawakkal, dan tidak berputus asa", "Merasa bebas dari tanggung jawab atas perbuatan sendiri", "Menganggap semua nasib sama bagi semua orang"],
    jawaban: 1,
    feedback: "Beriman kepada qada dan qadar mengajarkan kesabaran saat musibah, tidak sombong saat sukses, dan tidak berputus asa saat gagal — karena segalanya adalah ketetapan Allah yang terbaik."
  },
  {
    n: 3, cat: "Asmaul Husna", name: "Makna As-Sami' dan Al-Bashir",
    materi: `<strong>As-Sami' (السميع)</strong> = Allah Maha Mendengar. Allah mendengar semua suara, ucapan, bisikan hati, dan doa seluruh makhluk tanpa terbatas.<br><br><strong>Al-Bashir (البصير)</strong> = Allah Maha Melihat. Allah melihat semua perbuatan makhluk-Nya, baik yang nyata maupun tersembunyi, siang maupun malam.<br><br><strong>Penerapan:</strong> Menjaga ucapan dan perbuatan karena Allah selalu mendengar dan melihat kita.`,
    soal: "As-Sami' adalah salah satu Asmaul Husna yang berarti...",
    opsi: ["Allah Maha Melihat", "Allah Maha Mengetahui", "Allah Maha Mendengar", "Allah Maha Waspada"],
    jawaban: 2,
    feedback: "As-Sami' artinya Allah Maha Mendengar — mendengar semua ucapan, doa, dan bisikan makhluk-Nya. Al-Bashir artinya Allah Maha Melihat."
  },
  {
    n: 4, cat: "Iman kepada Malaikat", name: "Tugas Malaikat Israfil",
    materi: `<strong>Malaikat Israfil</strong> bertugas meniup sangkakala (terompet) atas perintah Allah.<br><br><strong>Dua tiupan sangkakala:</strong><br>1. <strong>Tiupan pertama (Nafkhatus Sa'aq)</strong> = mematikan semua makhluk hidup → awal Kiamat Kubra<br>2. <strong>Tiupan kedua (Nafkhatul Ba'ts)</strong> = membangkitkan semua manusia dari kubur untuk menghadap Allah di Padang Mahsyar`,
    soal: "Malaikat Israfil bertugas untuk...",
    opsi: ["Mencabut nyawa semua makhluk hidup", "Meniup sangkakala pada hari kiamat dan hari kebangkitan", "Mencatat amal baik manusia", "Menjaga surga"],
    jawaban: 1,
    feedback: "Malaikat Israfil bertugas meniup sangkakala — tiupan pertama mematikan semua makhluk (kiamat), tiupan kedua membangkitkan manusia dari kubur."
  },
  {
    n: 5, cat: "Iman kepada Malaikat", name: "Tugas Malaikat Izrail",
    materi: `<strong>Malaikat Izrail (Malakul Maut)</strong> bertugas mencabut nyawa semua makhluk hidup atas perintah Allah. Disebut dalam QS. As-Sajdah: 11.<br><br>Allah berfirman: <span class="ayat">قُلْ يَتَوَفَّاكُم مَّلَكُ الْمَوْتِ الَّذِي وُكِّلَ بِكُمْ</span><br>"Katakanlah: Malaikat maut yang diserahi tugasnya oleh Allah akan mewafatkan kalian." (QS. As-Sajdah: 11)`,
    soal: "Malaikat yang bertugas mencabut nyawa seluruh makhluk hidup adalah...",
    opsi: ["Malaikat Jibril", "Malaikat Mikail", "Malaikat Izrail", "Malaikat Israfil"],
    jawaban: 2,
    feedback: "Malaikat Izrail (disebut Malakul Maut dalam Al-Qur'an) bertugas mencabut nyawa semua makhluk hidup atas perintah Allah SWT."
  },
  {
    n: 6, cat: "Iman kepada Malaikat", name: "Tugas Malaikat Munkar dan Nakir",
    materi: `<strong>Malaikat Munkar dan Nakir</strong> bertugas menanyai manusia di dalam kubur (alam barzakh) setelah kematian.<br><br><strong>Pertanyaan di kubur:</strong><br>1. Siapa Tuhanmu? → Allah<br>2. Apa agamamu? → Islam<br>3. Siapa nabimu? → Muhammad SAW<br>4. Apa kitabmu? → Al-Qur'an<br>5. Apa kiblatmu? → Ka'bah<br><br>Orang beriman akan menjawab dengan benar dan mendapat ketenangan kubur.`,
    soal: "Malaikat Munkar dan Nakir bertugas untuk...",
    opsi: ["Menjaga neraka Jahannam", "Membagi rezeki kepada manusia", "Menanyai manusia di dalam kubur", "Mencatat amal buruk manusia"],
    jawaban: 2,
    feedback: "Malaikat Munkar dan Nakir bertugas menanyai manusia di dalam kubur tentang Tuhan, agama, nabi, dan amal perbuatannya."
  },
  {
    n: 7, cat: "Akhlak", name: "Alasan Boleh Tidak Mematuhi Orangtua",
    materi: `Islam mewajibkan berbakti kepada orangtua (birrul walidain). Namun ada pengecualian:<br><br><strong>Tidak boleh mematuhi orangtua jika:</strong><br>1. Orangtua menyuruh berbuat <strong>syirik</strong> (menyekutukan Allah)<br>2. Orangtua menyuruh berbuat <strong>maksiat/dosa besar</strong><br>3. Orangtua melarang beribadah kepada Allah<br><br>Dalil: QS. Luqman: 15 — "Jika keduanya memaksamu mempersekutukan Aku... jangan patuhi keduanya."<br>Hadits: "Tidak ada ketaatan kepada makhluk dalam kemaksiatan kepada Allah." (HR. Ahmad)`,
    soal: "Menurut Islam, seorang anak boleh tidak mematuhi orangtua apabila...",
    opsi: ["Orangtua memerintahkan hal yang tidak disukai anak", "Orangtua menyuruh berbuat syirik atau maksiat kepada Allah", "Orangtua tidak membelikan keinginan anak", "Orangtua terlalu keras dalam mendidik"],
    jawaban: 1,
    feedback: "Islam mewajibkan taat kepada orangtua, kecuali jika perintah mereka bertentangan dengan syariat Allah — seperti menyuruh syirik atau maksiat. (QS. Luqman: 15)"
  },
  {
    n: 8, cat: "Asmaul Husna", name: "Makna Al-'Alim dan Al-Khabir",
    materi: `<strong>Al-'Alim (العليم)</strong> = Allah Maha Mengetahui. Mengetahui segala sesuatu yang nyata dan tersembunyi, yang lampau dan yang akan datang, lahir dan batin.<br><br><strong>Al-Khabir (الخبير)</strong> = Allah Maha Waspada / Maha Mengenal. Mengetahui secara sangat detail dan terperinci semua hal, termasuk yang tersembunyi dalam hati dan rahasia terdalam.<br><br><strong>Perbedaan:</strong> Al-'Alim = pengetahuan umum yang luas; Al-Khabir = pengetahuan yang amat sangat rinci dan mendalam.`,
    soal: "Al-Khabir adalah salah satu Asmaul Husna yang berarti Allah...",
    opsi: ["Maha Mendengar segala doa", "Maha Melihat semua perbuatan", "Maha Mengetahui secara umum", "Maha Waspada dan Mengenal segala sesuatu secara rinci"],
    jawaban: 3,
    feedback: "Al-Khabir artinya Allah Maha Waspada — mengetahui segala sesuatu secara sangat terperinci dan mendalam, termasuk hal-hal yang tersembunyi."
  },
  {
    n: 9, cat: "Ibadah", name: "Hadits Keutamaan Shalat Berjamaah",
    materi: `Rasulullah SAW bersabda:<br><br><span class="ayat">صَلاةُ الجَماعَةِ تَفْضُلُ صَلاةَ الفَذِّ بِسَبْعٍ وَعِشْرِينَ دَرَجَةً</span><br><br>"Shalat berjamaah lebih utama daripada shalat sendirian sebanyak <strong>27 derajat</strong>." (HR. Bukhari & Muslim)<br><br><strong>Hikmah shalat berjamaah:</strong><br>• Mendapat pahala 27 kali lipat<br>• Mempererat ukhuwah Islamiyah<br>• Melatih kedisiplinan waktu<br>• Syiar Islam yang kuat`,
    soal: "Menurut hadits Bukhari & Muslim, keutamaan shalat berjamaah dibandingkan shalat sendirian adalah...",
    opsi: ["10 derajat", "17 derajat", "27 derajat", "37 derajat"],
    jawaban: 2,
    feedback: "Shalat berjamaah lebih utama 27 derajat dari shalat sendirian. (HR. Bukhari & Muslim). Ada juga riwayat 25 derajat dalam hadits lain."
  },
  {
    n: 10, cat: "Fiqih", name: "Yang Tidak Boleh Dilakukan Wanita Haid",
    materi: `<strong>Hal yang dilarang bagi wanita haid:</strong><br>1. <strong>Shalat</strong> — tidak wajib dan tidak boleh dikerjakan, tidak perlu di-qadha<br>2. <strong>Puasa</strong> — dilarang, wajib di-qadha setelah suci<br>3. <strong>Membaca Al-Qur'an</strong> — menurut pendapat mayoritas ulama dilarang<br>4. <strong>Menyentuh mushaf Al-Qur'an</strong> — tanpa wudhu/suci<br>5. <strong>Thawaf</strong> — mengelilingi Ka'bah<br>6. <strong>Berdiam di masjid</strong> — boleh lewat jika darurat<br>7. <strong>Berhubungan suami-istri</strong>`,
    soal: "Di antara hal berikut, yang TIDAK BOLEH dikerjakan wanita yang sedang haid adalah...",
    opsi: ["Berdzikir dan berdoa", "Membaca buku pelajaran", "Melaksanakan shalat wajib", "Bercakap-cakap dengan orang lain"],
    jawaban: 2,
    feedback: "Wanita yang sedang haid tidak boleh melaksanakan shalat (wajib maupun sunnah). Shalat yang ditinggalkan saat haid tidak perlu diqadha."
  },
  {
    n: 11, cat: "Iman kepada Malaikat", name: "Gelar Malaikat Jibril dan Izrail",
    materi: `<strong>Malaikat Jibril:</strong><br>• <strong>Ruhul Amin</strong> (الروح الأمين) = Roh yang dipercaya (QS. Asy-Syu'ara: 193)<br>• <strong>Ruhul Qudus</strong> (روح القدس) = Roh Suci (QS. Al-Baqarah: 87)<br>• <strong>An-Namus Al-Akbar</strong> = Pembawa rahasia terbesar<br><br><strong>Malaikat Izrail:</strong><br>• <strong>Malakul Maut</strong> (ملك الموت) = Malaikat Kematian — disebutkan dalam QS. As-Sajdah: 11<br>• Nama "Izrail" berasal dari hadits, bukan langsung dari Al-Qur'an`,
    soal: "Malaikat Jibril mendapat gelar 'Ruhul Amin' yang berarti...",
    opsi: ["Roh yang Maha Kuat", "Roh yang Dipercaya", "Roh Pembawa Rahmat", "Roh yang Mulia"],
    jawaban: 1,
    feedback: "Ruhul Amin berarti 'Roh yang Dipercaya'. Jibril dipercaya Allah untuk menyampaikan wahyu kepada para nabi dan rasul. (QS. Asy-Syu'ara: 193)"
  },
  {
    n: 12, cat: "Iman kepada Malaikat", name: "Tugas Malaikat Raqib dan Atid",
    materi: `<strong>Malaikat Raqib (رقيب)</strong> = bertugas mencatat semua amal <strong>BAIK</strong> manusia.<br><br><strong>Malaikat Atid (عتيد)</strong> = bertugas mencatat semua amal <strong>BURUK</strong> manusia.<br><br>Keduanya disebut <strong>Kiraman Katibin</strong> (para pencatat yang mulia). Firman Allah:<br><span class="ayat">مَا يَلْفِظُ مِن قَوْلٍ إِلَّا لَدَيْهِ رَقِيبٌ عَتِيدٌ</span><br>"Tidak ada satu kata pun yang diucapkan melainkan ada di sisinya malaikat pengawas yang selalu hadir." (QS. Qaf: 18)`,
    soal: "Malaikat Atid bertugas untuk...",
    opsi: ["Mencatat amal baik manusia", "Menjaga pintu surga", "Mencatat amal buruk manusia", "Membagi rezeki kepada manusia"],
    jawaban: 2,
    feedback: "Malaikat Atid bertugas mencatat amal BURUK manusia, sedangkan Raqib mencatat amal BAIK. Keduanya disebut Kiraman Katibin (QS. Qaf: 18)."
  },
  {
    n: 13, cat: "Iman kepada Kitab", name: "Isi dan Ajaran Kitab Taurat",
    materi: `<strong>Kitab Taurat</strong> diturunkan kepada Nabi <strong>Musa AS</strong> untuk Bani Israil.<br><br><strong>Isi pokok Kitab Taurat:</strong><br>1. <strong>Sepuluh Perintah Allah (Dekalog)</strong> — termasuk tauhid, larangan menyembah berhala, hormati orangtua, dll.<br>2. Syariat dan hukum kehidupan bagi Bani Israil<br>3. Aqidah tauhid — keesaan Allah<br>4. Kisah-kisah para nabi<br>5. Berita tentang kedatangan Nabi Muhammad SAW<br><br>Bahasa asli: <strong>Ibrani</strong>. Kini kitab Taurat yang ada telah mengalami perubahan (tahrif).`,
    soal: "Kitab Taurat diturunkan kepada Nabi...",
    opsi: ["Isa AS", "Dawud AS", "Musa AS", "Ibrahim AS"],
    jawaban: 2,
    feedback: "Kitab Taurat diturunkan kepada Nabi Musa AS untuk Bani Israil, berisi 10 Perintah Allah, syariat, dan ajaran tauhid."
  },
  {
    n: 14, cat: "Ibadah", name: "Nama Shalat Gerhana",
    materi: `<strong>Shalat Gerhana Bulan = Shalat Khusuf (خسوف)</strong><br>Dikerjakan saat terjadi gerhana bulan.<br><br><strong>Shalat Gerhana Matahari = Shalat Kusuf (كسوف)</strong><br>Dikerjakan saat terjadi gerhana matahari.<br><br>Cara pelaksanaan: 2 rakaat, setiap rakaat ada 2 kali rukuk dan 2 kali sujud. Dilaksanakan secara berjamaah di masjid.`,
    soal: "Shalat yang dilaksanakan saat terjadi gerhana matahari disebut shalat...",
    opsi: ["Khusuf", "Istisqa'", "Kusuf", "Tarawih"],
    jawaban: 2,
    feedback: "Shalat Kusuf = gerhana matahari. Shalat Khusuf = gerhana bulan. Cara pelaksanaannya sama: 2 rakaat dengan 2 kali rukuk di setiap rakaat."
  },
  {
    n: 15, cat: "Ibadah", name: "Sebab Melaksanakan Shalat Istisqa'",
    materi: `<strong>Shalat Istisqa' (استسقاء)</strong> = shalat meminta turun hujan.<br><br><strong>Sebab dilaksanakan:</strong><br>• Terjadi <strong>kemarau panjang</strong> yang menyebabkan kekeringan<br>• <strong>Kekurangan air</strong> untuk kebutuhan manusia, hewan, dan tanaman<br>• Krisis air yang mengancam kehidupan<br><br>Dilaksanakan di lapangan terbuka (mushalla) secara berjamaah, disunahkan imam berkhutbah dan berdoa menghadap kiblat.`,
    soal: "Shalat Istisqa' dilaksanakan karena...",
    opsi: ["Terjadi gerhana matahari total", "Ada wabah penyakit menular", "Kemarau panjang dan kekurangan air hujan", "Memperingati tahun baru Islam"],
    jawaban: 2,
    feedback: "Shalat Istisqa' (shalat minta hujan) dilaksanakan ketika terjadi kemarau panjang atau kekeringan yang menyebabkan kekurangan air."
  },
  {
    n: 16, cat: "Akhlak", name: "Dampak Berbohong di Tengah Masyarakat",
    materi: `<strong>Dampak negatif berbohong:</strong><br>1. <strong>Hilangnya kepercayaan</strong> dari orang lain<br>2. Merusak hubungan sosial dan persaudaraan<br>3. Fitnah dan gosip menyebar lebih luas<br>4. Menimbulkan permusuhan dan konflik<br>5. Pelaku terbiasa berdusta (gerbang kemaksiatan)<br>6. Dosa yang terus bertambah<br><br>Hadits: "Hendaklah kalian jujur, karena kejujuran membawa kepada kebaikan. Dan jauhilah dusta, karena dusta membawa kepada kejahatan." (HR. Bukhari-Muslim)`,
    soal: "Dampak paling serius dari kebiasaan berbohong di tengah masyarakat adalah...",
    opsi: ["Mendapat banyak teman baru", "Hilangnya kepercayaan dan rusaknya hubungan sosial", "Menjadi orang yang disegani", "Memperoleh keuntungan materi"],
    jawaban: 1,
    feedback: "Berbohong menghancurkan kepercayaan yang merupakan fondasi hubungan sosial. Sekali berbohong, reputasi seseorang rusak dan sulit dipercaya kembali."
  },
  {
    n: 17, cat: "Al-Qur'an", name: "QS. Ar-Rum Ayat 41",
    materi: `<span class="ayat">ظَهَرَ الْفَسَادُ فِي الْبَرِّ وَالْبَحْرِ بِمَا كَسَبَتْ أَيْدِي النَّاسِ لِيُذِيقَهُم بَعْضَ الَّذِي عَمِلُوا لَعَلَّهُمْ يَرْجِعُونَ</span><br><br><strong>Artinya:</strong> "Telah tampak kerusakan di darat dan di laut disebabkan perbuatan tangan manusia; Allah menghendaki agar mereka merasakan sebagian dari (akibat) perbuatan mereka, agar mereka kembali (ke jalan yang benar)."<br><br><strong>Pesan:</strong> Segala kerusakan alam (banjir, polusi, tanah longsor) adalah akibat ulah tangan manusia, sebagai peringatan agar bertobat dan kembali kepada Allah.`,
    soal: "Menurut QS. Ar-Rum ayat 41, kerusakan di darat dan laut disebabkan oleh...",
    opsi: ["Takdir Allah yang tidak bisa dihindari", "Bencana alam yang datang tiba-tiba", "Perbuatan tangan manusia itu sendiri", "Serangan dari makhluk gaib"],
    jawaban: 2,
    feedback: "QS. Ar-Rum: 41 menegaskan bahwa kerusakan alam disebabkan oleh perbuatan manusia, agar mereka merasakan akibatnya dan kembali ke jalan yang benar."
  },
  {
    n: 18, cat: "Akhlak", name: "Contoh Menjaga Lingkungan",
    materi: `<strong>Contoh perilaku menjaga lingkungan dalam Islam:</strong><br>1. Tidak membuang sampah sembarangan<br>2. Menanam pohon (Rasulullah menyebutnya sebagai sedekah)<br>3. Hemat dalam penggunaan air dan energi<br>4. Tidak merusak ekosistem laut/hutan<br>5. Mendaur ulang sampah<br>6. Tidak membakar lahan secara liar<br>7. Menjaga kebersihan lingkungan sekitar rumah<br><br>Hadits: "Barang siapa menanam pohon, maka pahalanya seperti bersedekah." (HR. Bukhari)`,
    soal: "Contoh perilaku menjaga lingkungan yang sesuai ajaran Islam adalah...",
    opsi: ["Membuang sampah di sungai agar tidak menumpuk", "Membakar hutan untuk lahan pertanian baru", "Menanam pohon dan tidak membuang sampah sembarangan", "Menggunakan pestisida sebanyak mungkin agar panen melimpah"],
    jawaban: 2,
    feedback: "Menanam pohon adalah sedekah jariyah dalam Islam. Menjaga lingkungan adalah bagian dari tugas khalifah di bumi."
  },
  {
    n: 19, cat: "Iman kepada Kitab", name: "Cara Beriman kepada Kitab Sebelum Al-Qur'an",
    materi: `<strong>Cara beriman kepada kitab-kitab sebelum Al-Qur'an:</strong><br>1. <strong>Meyakini keberadaannya</strong> sebagai wahyu Allah yang benar<br>2. Meyakini kebenarannya sebelum mengalami perubahan (tahrif)<br>3. <strong>Tidak mengamalkan hukumnya</strong> karena sudah dinasakh (digantikan) Al-Qur'an<br>4. Tidak menghina atau merendahkan kitab-kitab tersebut<br><br>Kitab-kitab Allah: Taurat (Musa), Zabur (Dawud), Injil (Isa), Al-Qur'an (Muhammad ﷺ)`,
    soal: "Cara yang benar beriman kepada kitab-kitab sebelum Al-Qur'an adalah...",
    opsi: ["Mengamalkan semua isinya dalam kehidupan sehari-hari", "Mempelajari dan menghafal seluruh isinya", "Meyakini keberadaannya sebagai wahyu Allah tanpa mengamalkan hukumnya", "Menganggap kitab-kitab tersebut sudah tidak relevan"],
    jawaban: 2,
    feedback: "Kita wajib meyakini kitab-kitab sebelum Al-Qur'an sebagai wahyu Allah yang benar, namun tidak mengamalkan hukumnya karena sudah digantikan Al-Qur'an."
  },
  {
    n: 20, cat: "Iman kepada Kitab", name: "Cara Mengimani Al-Qur'an",
    materi: `<strong>Cara mengimani Al-Qur'an secara sempurna:</strong><br>1. Meyakini Al-Qur'an adalah firman Allah yang haq (benar)<br>2. <strong>Membacanya</strong> dengan tajwid yang benar<br>3. <strong>Mempelajari</strong> dan memahami maknanya<br>4. <strong>Mengamalkan</strong> isinya dalam kehidupan sehari-hari<br>5. <strong>Mendakwahkan</strong> dan mengajarkannya kepada orang lain<br>6. Menjadikannya sebagai pedoman (hudan) dalam seluruh aspek kehidupan`,
    soal: "Cara mengimani Al-Qur'an yang paling sempurna adalah...",
    opsi: ["Hanya membacanya setiap hari tanpa memahami maknanya", "Menyimpan mushaf di tempat yang baik tanpa dibaca", "Meyakini, membaca, mempelajari, mengamalkan, dan mendakwahkannya", "Menghafal seluruh ayatnya tanpa mengamalkannya"],
    jawaban: 2,
    feedback: "Iman kepada Al-Qur'an harus mencakup: meyakini, membaca, mempelajari, mengamalkan, dan mendakwahkannya kepada orang lain."
  },
  {
    n: 21, cat: "Akhlak", name: "Contoh Amanah kepada Diri Sendiri",
    materi: `<strong>Amanah kepada diri sendiri</strong> = menjaga dan memenuhi hak-hak diri yang diberikan Allah.<br><br><strong>Contoh-contoh:</strong><br>1. Menjaga kesehatan jasmani (makan bergizi, olahraga)<br>2. Belajar dengan sungguh-sungguh — mengembangkan potensi diri<br>3. Tidak menyia-nyiakan waktu<br>4. Menjaga kesehatan mental/rohani (ibadah rutin)<br>5. Tidak merusak diri sendiri (menghindari rokok, narkoba)<br>6. Bertanggung jawab atas pilihan dan keputusan diri sendiri`,
    soal: "Contoh perilaku amanah terhadap diri sendiri adalah...",
    opsi: ["Selalu menuruti semua keinginan diri sendiri", "Belajar sungguh-sungguh dan menjaga kesehatan tubuh", "Mengabaikan pelajaran dan bermain sepanjang hari", "Selalu bergantung kepada orang tua dalam segala hal"],
    jawaban: 1,
    feedback: "Amanah kepada diri sendiri berarti memenuhi hak diri — belajar sungguh-sungguh, menjaga kesehatan, dan mengembangkan potensi yang diberikan Allah."
  },
  {
    n: 22, cat: "Ibadah", name: "Nilai Kedisiplinan dalam Shalat",
    materi: `<strong>Nilai kedisiplinan yang diajarkan shalat:</strong><br>1. <strong>Disiplin waktu</strong> — shalat pada 5 waktu yang telah ditentukan<br>2. <strong>Konsistensi</strong> — dilaksanakan setiap hari tanpa jeda<br>3. <strong>Tanggung jawab</strong> — kewajiban yang tidak bisa digantikan orang lain<br>4. <strong>Keteraturan</strong> — gerakan dan bacaan yang teratur dan terstruktur<br>5. <strong>Kepatuhan</strong> — tunduk pada aturan Allah<br><br>QS. An-Nisa: 103 — "Sesungguhnya shalat itu adalah kewajiban yang ditentukan waktunya atas orang-orang yang beriman."`,
    soal: "Nilai kedisiplinan yang paling kuat tercermin dalam pelaksanaan shalat adalah...",
    opsi: ["Mengerjakan shalat hanya saat ada waktu luang", "Shalat 5 waktu yang dilaksanakan tepat waktu setiap hari", "Shalat hanya pada hari Jumat dan hari raya", "Menggabungkan semua shalat di akhir hari"],
    jawaban: 1,
    feedback: "Shalat 5 waktu mengajarkan disiplin waktu tertinggi — tidak ada alasan menunda karena Allah sendiri yang menetapkan waktunya (QS. An-Nisa: 103)."
  },
  {
    n: 23, cat: "Akhlak", name: "Perilaku yang Tidak Mencerminkan Cinta Alam",
    materi: `<strong>Perilaku yang TIDAK mencerminkan cinta alam:</strong><br>1. Membuang sampah di sungai, laut, atau sembarang tempat<br>2. Menebang pohon secara liar tanpa izin<br>3. Membakar lahan/hutan<br>4. Berburu hewan langka yang dilindungi<br>5. Menggunakan pestisida/bahan kimia berlebihan<br>6. Membuang limbah industri ke sungai<br>7. Tidak mendaur ulang sampah<br><br>Semua ini bertentangan dengan ajaran Islam tentang khalifah yang memakmurkan bumi.`,
    soal: "Perilaku berikut yang TIDAK mencerminkan cinta terhadap alam lingkungan adalah...",
    opsi: ["Menanam pohon di sekitar rumah", "Memilah sampah sebelum dibuang", "Membuang limbah rumah tangga ke sungai", "Menggunakan kantong belanja ramah lingkungan"],
    jawaban: 2,
    feedback: "Membuang limbah ke sungai merusak ekosistem air dan bertentangan dengan tugas manusia sebagai khalifah yang memakmurkan bumi."
  },
  {
    n: 24, cat: "Aqidah", name: "Tugas Khalifah di Muka Bumi",
    materi: `Allah menciptakan manusia sebagai <strong>khalifah fil ardh</strong> (wakil/pemimpin di bumi) — QS. Al-Baqarah: 30.<br><br><strong>Tugas khalifah:</strong><br>1. <strong>Memakmurkan bumi</strong> (al-'imarah) — membangun peradaban<br>2. <strong>Menjaga kelestarian alam</strong> — tidak membuat kerusakan<br>3. <strong>Menegakkan keadilan</strong> dalam kehidupan<br>4. <strong>Menggunakan akal dan ilmu</strong> untuk kemaslahatan umat<br>5. <strong>Beribadah kepada Allah</strong> — mengabdi dan taat<br>6. Mengelola sumber daya sesuai syariat Islam`,
    soal: "Sebagai khalifah di muka bumi, tugas utama manusia adalah...",
    opsi: ["Menguasai dan mengeksploitasi alam sebesar-besarnya", "Memakmurkan bumi dan menjaga kelestariannya sesuai syariat Allah", "Menghindari semua urusan duniawi demi akhirat", "Memerintah sesama manusia dengan kekuasaan penuh"],
    jawaban: 1,
    feedback: "Khalifah berarti wakil Allah di bumi yang bertugas memakmurkan, menjaga, dan mengelola bumi dengan adil sesuai kehendak Allah (QS. Al-Baqarah: 30)."
  },
  {
    n: 25, cat: "Al-Qur'an", name: "Arti Surah Al-Qashash Ayat 77",
    materi: `<span class="ayat">وَابْتَغِ فِيمَا آتَاكَ اللَّهُ الدَّارَ الْآخِرَةَ وَلَا تَنسَ نَصِيبَكَ مِنَ الدُّنْيَا وَأَحْسِن كَمَا أَحْسَنَ اللَّهُ إِلَيْكَ</span><br><br><strong>Artinya:</strong> "Dan carilah pada apa yang telah dianugerahkan Allah kepadamu (kebahagiaan) negeri akhirat, dan janganlah kamu melupakan bagianmu dari (kenikmatan) dunia, dan berbuat baiklah (kepada orang lain) sebagaimana Allah telah berbuat baik kepadamu..."<br><br><strong>Pelajaran:</strong> Keseimbangan antara kepentingan dunia dan akhirat; tidak boleh melupakan salah satunya.`,
    soal: "Surah Al-Qashash ayat 77 mengajarkan bahwa seorang Muslim harus...",

// Group topics by category for materi page
const cats = {};
topics.forEach(t => {
  if (!cats[t.cat]) cats[t.cat] = [];
  cats[t.cat].push(t);
});

// Render materi
const mc = document.getElementById('materi-content');
Object.keys(cats).forEach(cat => {
  const g = document.createElement('div');
  g.className = 'topic-group';
  g.innerHTML = `<div class="topic-group-title">${cat}</div><div class="topic-cards" id="cat-${cat.replace(/\s/g,'-')}"></div>`;
  mc.appendChild(g);
  const grid = g.querySelector('.topic-cards');
  cats[cat].forEach(t => {
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.innerHTML = `<div class="topic-card-header"><span class="topic-num">${t.n}</span><span class="topic-name">${t.name}</span></div><div class="topic-body">${t.materi}</div>`;
    card.addEventListener('click', () => {
      const wasOpen = card.classList.contains('open');
      card.classList.toggle('open', !wasOpen);
    });
    grid.appendChild(card);
  });
});

// ===== SOAL ENGINE =====
let current = 0;
let answers = new Array(50).fill(null);
let submitted = new Array(50).fill(false);

function renderSoal() {
  const t = topics[current];
  const pct = Math.max(2, Math.round((current / 50) * 100));
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('soal-counter').textContent = `Soal ${current + 1} / 50`;
  document.getElementById('soal-cat').textContent = t.cat;

  const area = document.getElementById('soal-area');
  const isSubmitted = submitted[current];
  const userAns = answers[current];
  const correct = t.jawaban;

  let optsHtml = t.opsi.map((o, i) => {
    let cls = 'soal-opt';
    if (isSubmitted) {
      if (i === correct) cls += ' correct';
      else if (i === userAns && userAns !== correct) cls += ' wrong';
    } else if (userAns === i) {
      cls += ' selected';
    }
    const letters = ['A', 'B', 'C', 'D'];
    return `<li class="${cls}" onclick="selectOpt(${i})"><span class="opt-letter">${letters[i]}.</span><span>${o}</span></li>`;
  }).join('');

  let feedbackHtml = '';
  if (isSubmitted) {
    const isCorrect = userAns === correct;
    const cls = isCorrect ? 'correct-fb' : 'wrong-fb';
    const icon = isCorrect ? '✓ Benar!' : '✗ Kurang tepat.';
    feedbackHtml = `<div class="soal-feedback ${cls} show"><strong>${icon}</strong> ${t.feedback}</div>`;
  }

  let submitBtn = '';
  if (!isSubmitted) {
    submitBtn = `<button class="btn btn-primary" onclick="submitAns()" ${userAns === null ? 'disabled' : ''}>Periksa Jawaban</button>`;
  } else if (current === 49) {
    submitBtn = `<button class="btn btn-primary" onclick="showHasil()">Lihat Hasil Akhir →</button>`;
  } else {
    submitBtn = `<button class="btn btn-primary" onclick="nextSoal()">Soal Berikutnya →</button>`;
  }

  area.innerHTML = `
    <div class="soal-card">
      <div class="soal-q">${t.soal}</div>
      <ul class="soal-options">${optsHtml}</ul>
      ${feedbackHtml}
    </div>
    <div class="soal-nav">
      <button class="btn btn-outline" onclick="prevSoal()" ${current === 0 ? 'disabled' : ''}>← Sebelumnya</button>
      ${submitBtn}
    </div>
  `;

  renderSkipGrid();
}

function renderSkipGrid() {
  const grid = document.getElementById('skip-grid');
  grid.innerHTML = '';
  topics.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'skip-num' + (submitted[i] ? ' done' : '') + (i === current ? ' current' : '');
    btn.textContent = i + 1;
    btn.onclick = () => { current = i; renderSoal(); };
    grid.appendChild(btn);
  });
}

function selectOpt(i) {
  if (submitted[current]) return;
  answers[current] = i;
  renderSoal();
}

function submitAns() {
  if (answers[current] === null) return;
  submitted[current] = true;
  renderSoal();
}

function nextSoal() {
  if (current < 49) { current++; renderSoal(); }
}

function prevSoal() {
  if (current > 0) { current--; renderSoal(); }
}

function showHasil() {
  let benar = 0, salah = 0, sisa = 0;
  topics.forEach((t, i) => {
    if (!submitted[i]) sisa++;
    else if (answers[i] === t.jawaban) benar++;
    else salah++;
  });
  const nilai = Math.round((benar / 50) * 100);
  let predikat = nilai >= 85 ? 'Sangat Baik 🌟' : nilai >= 70 ? 'Baik 👍' : nilai >= 55 ? 'Cukup 📚' : 'Perlu Belajar Lagi 💪';

  const area = document.getElementById('soal-area');
  area.innerHTML = `
    <div class="hasil-wrap">
      <div class="hasil-score">${nilai}</div>
      <div class="hasil-label">Nilai Akhir — ${predikat}</div>
      <div class="hasil-detail">
        <div class="hasil-box benar"><span>${benar}</span>Benar</div>
        <div class="hasil-box salah"><span>${salah}</span>Salah</div>
        <div class="hasil-box sisa"><span>${sisa}</span>Belum Dijawab</div>
      </div>
      <button class="btn btn-primary" onclick="resetUjian()">Ulangi Latihan</button>
    </div>
  `;
  document.getElementById('skip-grid').innerHTML = '';
  document.getElementById('progress-fill').style.width = '100%';
}

function resetUjian() {
  current = 0;
  answers = new Array(50).fill(null);
  submitted = new Array(50).fill(false);
  renderSoal();
}

function showPage(p) {
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('page-' + p).classList.add('active');
  event.target.classList.add('active');
  if (p === 'soal') renderSoal();
}

<!-- ===== AUDIO LATAR ===== -->
<audio id="bg-audio" loop preload="auto">
  <source src="musik0.mp3" type="audio/mpeg">
</audio>

<button id="music-btn" title="Musik Latar">
  <div class="music-bars" id="music-bars">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <span class="music-label" id="music-label">MUSIK</span>
</button>
<div id="music-toast">🎵 musik0.mp3</div>

<script>
const audio = document.getElementById('bg-audio');
const btn = document.getElementById('music-btn');
const bars = document.getElementById('music-bars');
const label = document.getElementById('music-label');
const toast = document.getElementById('music-toast');
let playing = false;

function setPlaying(state) {
  playing = state;
  bars.classList.toggle('paused', !state);
  label.textContent = state ? 'MUSIK' : 'MUTE';
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

function tryPlay() {
  audio.volume = 0.45;
  audio.play().then(() => {
    setPlaying(true);
    showToast('🎵 Memutar musik0.mp3');
  }).catch(() => {
    setPlaying(false);
  });
}

btn.addEventListener('click', () => {
  if (playing) {
    audio.pause();
    setPlaying(false);
    showToast('⏸ Musik dijeda');
  } else {
    tryPlay();
  }
});

// Coba autoplay langsung saat halaman dimuat
tryPlay();

// Jika browser blokir autoplay, putar otomatis saat interaksi pertama
const autoplayEvents = ['click', 'keydown', 'touchstart', 'scroll'];
function onFirstInteraction() {
  if (!playing) tryPlay();
  autoplayEvents.forEach(e => document.removeEventListener(e, onFirstInteraction));
}
autoplayEvents.forEach(e => document.addEventListener(e, onFirstInteraction, { once: true }));

// Lanjutkan setelah tab dibuka kembali
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !playing) tryPlay();
});
</script>
